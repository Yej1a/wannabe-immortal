<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wannabe Immortal</title>
  <link rel="stylesheet" href="./styles.css?v=20260320-1">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="brand">Wannabe Immortal</div>
        <div class="subtitle">10-minute cultivation roguelite prototype</div>
      </div>
      <div class="topbar-actions">
        <button id="pause-btn" class="action-btn pause-btn" type="button" disabled>Pause</button>
        <button id="clear-save-btn" class="action-btn" type="button">清空存档</button>
        <button id="start-btn" class="start-btn" type="button">开始试炼</button>
      </div>
    </header>
    <main class="game-layout">
      <section class="hud left-panel">
        <div class="panel-block">
          <div class="label-row"><span>生命</span><span id="health-text"></span></div>
          <div class="meter"><div id="health-fill" class="fill life"></div></div>
        </div>
        <div class="panel-block">
          <div class="label-row"><span>修为 Lv.<span id="level-text">1</span></span><span id="xp-text"></span></div>
          <div class="meter"><div id="xp-fill" class="fill xp"></div></div>
        </div>
        <div class="panel-block">
          <div class="small-title">状态</div>
          <div id="status-list" class="status-list"></div>
        </div>
      </section>
      <section class="center-stage">
        <div class="timer-row">
          <span id="phase-text">待开始</span>
          <span id="timer-text">10:00</span>
        </div>
        <canvas id="game" width="960" height="540"></canvas>
        <div id="overlay-message" class="overlay-message show">
          <div class="overlay-title">修仙肉鸽原型</div>
          <div class="overlay-body">WASD 移动，自动释放术法。按下开始进入试炼。</div>
        </div>
        <div id="toast" class="toast"></div>
        <div id="skill-bar" class="skill-bar"></div>
      </section>
      <section class="hud right-panel">
        <div class="panel-block">
          <div class="small-title">白槽</div>
          <div class="label-row"><span id="white-stage-text">白槽推进</span><span id="white-text"></span></div>
          <div class="meter dual"><div id="white-fill" class="fill white"></div></div>
        </div>
        <div class="panel-block">
          <div class="small-title">黑槽</div>
          <div class="label-row"><span id="black-stage-text">黑槽推进</span><span id="black-text"></span></div>
          <div class="meter dual"><div id="black-fill" class="fill black"></div></div>
        </div>
        <div class="panel-block">
          <div class="small-title">提示</div>
          <div class="node-hint">黑白槽满时，可在关后改写命格道性。</div>
        </div>
      </section>
    </main>
  </div>

  <div id="modal-root" class="modal-root hidden"></div>

  <script src="./balance.js?v=20260320-2"></script>
  <script src="./modules/game-data.js?v=20260320-2"></script>
  <script src="./modules/runtime-state.js?v=20260320-2"></script>
  <script src="./modules/destiny-helpers.js?v=20260320-2"></script>
  <script src="./modules/game-ui.js?v=20260320-3"></script>
  <script src="./modules/debug-tools.js?v=20260320-3"></script>
  <script src="./app.js?v=20260320-3"></script>
</body>
</html>
